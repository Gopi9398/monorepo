name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: ["main"]

jobs:

  # 🔹 1. TEST JOB (Runs on PR + main)
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install

      - name: Scan dependencies (npm audit)
        run: |
          cd Backend
          npm audit --audit-level=high
          
      - name: Run Unit & Integration Tests
        run: |
          cd Backend
          npm test


  # 🔹 2. BUILD & PUSH DOCKER IMAGE (Only on main)
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t task-app ./Backend

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Tag Docker Image
        run: |
          docker tag task-app:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "task-app"


  # 🔹 3. DEPLOY TO STAGING (Auto)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Deploy to EC2 (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
            docker rm -f task-app || true
            docker run -d -p 5000:5000 --name task-app ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest


  # 🔹 4. DEPLOY TO PRODUCTION (Manual Approval Required)
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Deploy to EC2 (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
            docker rm -f task-app-prod || true
            docker run -d -p 5001:5000 --name task-app-prod ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest


  # 🔔 5. NOTIFICATION ON FAILURE
  notify-slack:
    runs-on: ubuntu-latest
    needs: [test, build, deploy-staging, deploy-production]
    if: failure()

    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
